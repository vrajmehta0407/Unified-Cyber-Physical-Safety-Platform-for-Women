name: cybershield
description: Cyber-Integrated Safety Platform for Women — KANADSHIELD26_P2_01
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7
  go_router: ^14.6.2
  flutter_secure_storage: ^9.2.4
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  file_picker: ^8.1.6
  crypto: ^3.0.6
  encrypt: ^5.0.3
  speech_to_text: ^7.0.0
  url_launcher: ^6.3.1
  google_maps_flutter: ^2.10.0
  intl: ^0.20.2
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.3
  provider: ^6.1.2
  # Firebase stack
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_database: ^11.1.4
  firebase_messaging: ^15.1.3
  # Shake-to-SOS
  shake: ^3.0.0
  # Live streaming (WebRTC)
  flutter_webrtc: ^0.12.5
  # On-device TFLite AI
  tflite_flutter: ^0.12.1
  # Local notifications (for FCM foreground)
  flutter_local_notifications: ^17.2.4


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
